name: CI
on:
  push:
    branches:
    - main
  pull_request:
    paths-ignore:
    - README.md

  schedule:
    # run this once a week (wednesday) at 3 am UTC
  - cron: 0 3 * * 3
  workflow_dispatch:

permissions: {}

jobs:
  tests:
    strategy:
      fail-fast: false
      matrix:
        os:
        - ubuntu-latest
        - macos-latest
        - windows-latest
        python-version:
        - '3.14'
        include:
        - os: ubuntu-22.04
          python-version: 3.11.0
          install-args: --resolution=lowest
          test-args: -Wdefault
        - os: windows-latest
          python-version: 3.11.0
        - os: macos-14
          python-version: 3.11.0

    name: ${{ matrix.os }}-py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: false
    - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: ${{ matrix.python-version }}
    - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        prune-cache: false

    - name: Build
      run: |
        uv sync --no-editable --group test ${{ matrix.install-args }}

    - name: Run pytest
      run: |
        uv run --no-sync pytest --color=yes ${{ matrix.test-args }}
